repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix", "--show-fixes"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: sort-simple-yaml
      - id: pretty-format-json
        exclude: ^package-lock\.json$
      - id: debug-statements
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: requirements-txt-fixer

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.20.0
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-mkdocs
          - mdformat-footnote

  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        language: python
        entry: uvx ty check
        args: [--python=.venv/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: biome check --write
        language: node
        additional_dependencies:
          - "@biomejs/biome@1.9.4"
        files: '^(app/|index\\.html$|vite\\.config\\.js$|package\\.json$|biome\\.json$)'

      - id: uv-lock
        name: Lock dependencies with uv
        entry: uv lock
        language: system
        pass_filenames: false
