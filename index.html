<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USDA CSB Atlas</title>
    <meta
      name="description"
      content="Interactive viewer for USDA Crop Sequence Boundaries PMTiles archives."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23121612'/%3E%3Cpath d='M14 40C20 28 28 20 38 18c5-1 9 0 12 3-12 1-23 8-31 21-1 2-3 3-5 3-1 0-1-1 0-5Z' fill='%23c8a85a'/%3E%3Cpath d='M18 46c8-3 17-2 26 3' stroke='%237b8f55' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div class="app-shell">
      <div id="map" aria-label="Map"></div>

      <aside class="panel" id="legend-panel">
        <div class="panel-header">
          <div>
            <a
              class="eyebrow eyebrow-link"
              href="https://www.nass.usda.gov/Research_and_Science/Crop-Sequence-Boundaries/index.php"
              target="_blank"
              rel="noreferrer"
            >
              USDA CSB
            </a>
            <h1>Crop Sequence Boundaries</h1>
          </div>
          <button id="panel-toggle" class="panel-toggle" type="button" aria-expanded="true">
            Hide
          </button>
        </div>

        <div class="panel-body">
          <p class="lede">
            Explore the 2025 field polygons as a PMTiles-backed map on
            <a class="lede-link" href="https://source.coop/ftw/usda-csb" target="_blank" rel="noreferrer">
              Source Coop
            </a>
          </p>
          <div id="status" class="status-line" role="status" aria-live="polite">Connecting</div>

          <div class="control-grid">
            <div class="control-row control-row-wide control-row-triple">
              <div class="control-inline">
                <span class="control-label">Fields</span>
                <button
                  id="overlay-toggle"
                  class="toggle-button toggle-button-compact"
                  type="button"
                  aria-pressed="true"
                >
                  On
                </button>
              </div>

              <div class="control-inline">
                <span class="control-label">Basemap</span>
                <button
                  id="basemap-toggle"
                  class="toggle-button toggle-button-compact"
                  type="button"
                  aria-pressed="true"
                >
                  Satellite
                </button>
              </div>
            </div>

            <div class="control-row control-row-wide aoi-section" aria-label="Area of interest export">
              <div class="section-head compact">
                <span>AOI Export</span>
                <span id="aoi-summary" class="legend-note">None selected</span>
              </div>
              <p class="aoi-hint">Hold Shift and drag on the map to draw a bounding box.</p>
              <div class="aoi-controls">
                <label class="control-label" for="download-format">Format</label>
                <select id="download-format" class="select-input" aria-label="Download format">
                  <option value="geoparquet" selected>GeoParquet</option>
                  <option value="geojson">GeoJSON</option>
                </select>
                <button id="download-aoi" class="toggle-button" type="button" disabled>
                  Download AOI
                </button>
              </div>
            </div>

            <div id="legend-section" class="control-row control-row-wide legend-section">
              <div id="legend-list" class="legend-list">
                <div id="cdl-legend" class="legend-grid" aria-label="CDL crop legend"></div>
              </div>
              <button
                id="legend-toggle"
                class="toggle-button toggle-button-compact legend-button"
                type="button"
                aria-expanded="true"
              >
                CDL Legend
              </button>
            </div>
          </div>
        </div>
      </aside>

      <button
        id="sidebar-toggle"
        class="sidebar-toggle"
        type="button"
        aria-expanded="false"
        hidden
      >
        Show
      </button>
    </div>

    <script type="module" src="/app/main.js"></script>
  </body>
</html>
